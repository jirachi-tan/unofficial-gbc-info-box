name: Sync Notion Data

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron is UTC. To run at Japan time 06:00 (JST), use UTC 21:00 previous day.
    - cron: "0 21 * * *"

permissions:
  contents: write

concurrency:
  group: sync-notion
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run sync:notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATA_SOURCE_ID: ${{ secrets.NOTION_DATA_SOURCE_ID }}

      - id: changes
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain -- public/data/events.json)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/events.json
          git commit -m "chore: sync notion events"
          git push

      - if: steps.changes.outputs.changed != 'true'
        run: echo "No changes detected in public/data/events.json"